name: Initialize Package Snapshot

"on":
  workflow_call:
    inputs:
      branch_name:
        description: 'Name for the new snapshot branch (e.g., ss-dev)'
        required: true
        type: string
      packages_yaml_path:
        description: 'Path to packages.yaml configuration file'
        required: false
        type: string
        default: 'config/packages.yaml'
      source_branch:
        description: 'Source branch to read packages.yaml from'
        required: false
        type: string
        default: 'main'
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Name for the new snapshot branch (e.g., ss-dev)'
        required: true
        type: string
      packages_yaml_path:
        description: 'Path to packages.yaml configuration file'
        required: false
        type: string
        default: 'config/packages.yaml'
      source_branch:
        description: 'Source branch to read packages.yaml from'
        required: false
        type: string
        default: 'main'

permissions:
  contents: write

jobs:
  init-snapshot:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch }}
          fetch-depth: 0

      - name: Validate config file exists
        run: |
          if [ ! -f "${{ inputs.packages_yaml_path }}" ]; then
            echo "Error: ${{ inputs.packages_yaml_path }} not found on ${{ inputs.source_branch }} branch"
            exit 1
          fi

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Install dependencies
        run: |
          Rscript -e '
            install.packages("pak", repos = "https://r-lib.github.io/p/pak/dev/")
            pak::pkg_install("OpenRBQM/workr@dev")
          '

      - name: Create Package Snapshot
        run: |
          Rscript -e '
            library(workr)

            pkg_config <- yaml::read_yaml("${{ inputs.packages_yaml_path }}")
            pkgSnapshot(
              path = "snapshot_output",
              packageList = pkg_config$packages
            )
          '

      - name: Create orphan branch and push snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create orphan branch
          git checkout --orphan ${{ inputs.branch_name }}
          git rm -rf .

          # Copy snapshot output to branch root
          cp snapshot_output/manifest.csv .
          [ -f snapshot_output/rproject.toml ] && cp snapshot_output/rproject.toml .
          [ -f "${{ inputs.packages_yaml_path }}" ] || true
          cp "${{ inputs.packages_yaml_path }}" packages.yaml 2>/dev/null || true
          [ -d snapshot_output/workflows ] && cp -r snapshot_output/workflows .

          # Record snapshot date
          date -u +%Y-%m-%d > _snapshot_date.txt

          git add -A
          git commit -m "Initialize Package Snapshot: ${{ inputs.branch_name }}"
          git push origin ${{ inputs.branch_name }}
