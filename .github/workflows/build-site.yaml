name: Build and Deploy Site

"on":
  push:
    branches:
      - 'ss-*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate _index.json
        run: |
          if [ -d "workflows" ]; then
            find workflows -name "*.yaml" -o -name "*.yml" | sort | \
              jq -R -s 'split("\n") | map(select(length > 0))' > _index.json
          else
            echo "[]" > _index.json
          fi
          echo "Generated _index.json:"
          cat _index.json

      - name: Install site dependencies
        run: npm ci
        working-directory: site

      - name: Build Vite app
        run: npm run build
        working-directory: site

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
